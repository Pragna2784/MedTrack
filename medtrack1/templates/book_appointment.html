{% extends "base.html" %}

{% block content %}

<div class="form-card">

<h2>Book Appointment</h2>

<form method="POST">

<label>Doctor Email</label>
<input type="email" name="doctor_email" required>

<label>Date</label>
<input type="date" name="date" required>

<label>Time</label>
<input type="time" name="time" required>

<button class="btn">Book</button>

</form>

</div>

{% endblock %}
