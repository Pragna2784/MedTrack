{% extends "base.html" %}

{% block content %}

<h2 class="page-title">Appointments</h2>

<table>

<thead>
<tr>

<th>ID</th>
<th>Doctor</th>
<th>Date</th>
<th>Time</th>
<th>Status</th>

</tr>
</thead>

<tbody>

{% for a in appointments %}

<tr>

<td>{{a.id}}</td>
<td>{{a.doctor}}</td>
<td>{{a.date}}</td>
<td>{{a.time}}</td>
<td>{{a.status}}</td>

</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
