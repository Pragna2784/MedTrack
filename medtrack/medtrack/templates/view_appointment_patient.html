{% extends "base.html" %}
{% block content %}

<h2>My Appointments</h2>

<table border="1">
<tr>
<th>ID</th>
<th>Doctor</th>
<th>Date</th>
<th>Time</th>
<th>Status</th>
</tr>

{% for a in appointments %}
<tr>
<td>{{ a.id }}</td>
<td>{{ a.doctor }}</td>
<td>{{ a.date }}</td>
<td>{{ a.time }}</td>
<td>{{ a.status }}</td>
</tr>
{% endfor %}

</table>

{% endblock %}
